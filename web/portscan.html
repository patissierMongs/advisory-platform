<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>포트스캔 콘솔</title>
<style>
  :root{--bg:#f4f6fa;--card:#fff;--ink:#15294a;--sub:#7a889c;--line:#e3e9f2;--brand:#2f5bd0;--brand-d:#21408f}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:"Pretendard","Malgun Gothic",system-ui,sans-serif;font-size:14px;line-height:1.5}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1100px;margin:0 auto;padding:0 16px 64px}
  header{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
  .hd{max-width:1100px;margin:0 auto;padding:14px 16px;display:flex;align-items:center;gap:12px}
  .hd h1{font-size:16px;margin:0;font-weight:800}
  .hd .sp{flex:1}
  .hd .lnk{font-size:12px;color:var(--sub);border:1px solid var(--line);padding:6px 11px;border-radius:8px}
  h2.section{font-size:13px;color:var(--sub);font-weight:700;margin:22px 2px 10px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:12px}
  .row{cursor:pointer;transition:box-shadow .12s,border-color .12s}
  .row:hover{border-color:#c3d2f0;box-shadow:0 3px 14px rgba(20,41,74,.07)}
  .btn{background:var(--brand);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit}
  .btn:hover{background:var(--brand-d)} .btn:disabled{opacity:.5;cursor:default}
  .btn-ghost{background:#fff;color:var(--sub);border:1px solid var(--line);padding:7px 13px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit}
  input,select{font-family:inherit;font-size:13px;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:#fcfdff;outline:none}
  input:focus,select:focus{border-color:var(--brand)}
  label.f{display:block;font-size:11.5px;font-weight:700;color:#4a5568;margin:0 0 4px}
  .muted{color:var(--sub)} .err{background:#fdecec;color:#c0392b;border:1px solid #f6cdcb;padding:10px 13px;border-radius:8px;font-size:12.5px;margin:10px 0}
  .ok{background:#eaf3ee;color:#2e7d52;border:1px solid #cfe6d8;padding:10px 13px;border-radius:8px;font-size:12.5px;margin:10px 0}
  .chip{display:inline-block;background:#eef1f5;color:#5a6678;font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;margin-left:4px}
  .id-Y{background:#e8f6ee;color:#2e7d52}.id-P{background:#fcf6e3;color:#9a7d12}.id-N{background:#fdecec;color:#c0392b}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{text-align:left;color:var(--sub);font-weight:700;font-size:11.5px;padding:7px 8px;border-bottom:1px solid var(--line);position:sticky;top:56px;background:var(--card)}
  td{padding:7px 8px;border-bottom:1px solid var(--line);vertical-align:top}
  tr.hl td{background:#fff8f6}
  .mono{font-family:ui-monospace,Consolas,monospace}
  .evi{color:#4a5568;font-size:11.5px;max-width:380px;word-break:break-word}
  .grid{display:flex;gap:10px;align-items:end;flex-wrap:wrap}
  .stat{display:inline-block;margin-right:16px;font-size:12.5px}
  .stat b{font-size:18px;display:block;color:var(--ink)}
  .filterbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
  .ck{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:#4a5568;cursor:pointer}
  .back{font-size:13px;color:var(--brand);font-weight:600;cursor:pointer;display:inline-block;margin:16px 0 4px}
  .diffbox{display:flex;gap:10px;flex-wrap:wrap}
  .diffcol{flex:1;min-width:220px}
  .pchip{font-family:ui-monospace,monospace;font-size:11.5px;background:#f3f6fb;border:1px solid var(--line);border-radius:6px;padding:2px 7px;display:inline-block;margin:2px}
  .new .pchip{background:#eaf3ee;border-color:#cfe6d8}.closed .pchip{background:#fdecec;border-color:#f6cdcb}
</style>
</head>
<body>
<header><div class="hd">
  <h1>🛰️ 포트스캔 콘솔</h1><span class="sp"></span>
  <a class="lnk" href="/admin">관리자 ↗</a>
</div></header>
<div class="wrap" id="app"><div class="muted" style="padding:40px;text-align:center">불러오는 중…</div></div>

<script>
const API="/api/v1/scans";
const app=document.getElementById("app");
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
const FILT={onlyAction:false,q:""};

async function api(path,opts){
  const r=await fetch(API+path,opts);
  if(!r.ok){let m="요청 실패 ("+r.status+")";try{const j=await r.json();if(j.detail)m=typeof j.detail==="string"?j.detail:JSON.stringify(j.detail);}catch(e){}throw new Error(m);}
  return r.status===204?null:r.json();
}
const fmt=s=>s?s.slice(0,16).replace("T"," "):"—";
function idBadge(v){const ko={Y:"식별",P:"판독필요",N:"정체불명"};return `<span class="chip id-${v}">${ko[v]||v}</span>`;}

function route(){const m=location.hash.match(/^#\/r\/(\d+)/);if(m)renderDetail(+m[1]);else renderList();}

async function renderList(){
  app.innerHTML=`
   <h2 class="section">회차 가져오기 (스캐너 회차 폴더 zip)</h2>
   <div class="card">
     <div id="uperr"></div>
     <div class="grid">
       <div><label class="f">회차 zip 파일</label><input id="u_file" type="file" accept=".zip"></div>
       <div><label class="f">라벨</label><input id="u_label" placeholder="예: 2026-06 업무망 1차"></div>
       <div><label class="f">망 구분</label>
         <select id="u_net"><option value="biz">업무망</option><option value="inet">인터넷망</option><option value="">기타</option></select></div>
       <button class="btn" id="u_btn" onclick="doUpload()">가져오기</button>
     </div>
     <div class="muted" style="font-size:11.5px;margin-top:8px">스캐너 out\\&lt;회차&gt; 폴더를 통째로 zip 해서 올리세요. 서버가 XML을 병합·식별합니다.</div>
   </div>
   <h2 class="section">스캔 회차</h2>
   <div id="runs"><div class="muted">불러오는 중…</div></div>`;
  await loadRuns();
}
async function loadRuns(){
  const el=document.getElementById("runs");
  try{
    const {items}=await api("");
    if(!items.length){el.innerHTML=`<div class="card muted" style="text-align:center">가져온 회차가 없습니다.</div>`;return;}
    const net={biz:"업무망",inet:"인터넷망"};
    el.innerHTML=items.map(r=>`<div class="card row" onclick="location.hash='#/r/${r.id}'">
      <div style="display:flex;align-items:center;gap:10px">
        <b style="font-size:14.5px">${esc(r.label)}</b>
        <span class="chip">${net[r.network]||r.network||"기타"}</span>
        <span class="muted" style="font-size:12px">${fmt(r.created_at)}</span>
      </div>
      <div style="margin-top:8px">
        <span class="stat"><b>${r.host_count}</b>호스트</span>
        <span class="stat"><b>${r.open_port_count}</b>열린 포트</span>
        <span class="stat" style="color:#2e7d52"><b>${r.identified_count}</b>식별</span>
        <span class="stat" style="color:#c0392b"><b>${r.unidentified_count}</b>조치 대상</span>
      </div></div>`).join("");
  }catch(e){el.innerHTML=`<div class="err">${esc(e.message)}</div>`;}
}
window.doUpload=async function(){
  const f=document.getElementById("u_file").files[0];
  const err=document.getElementById("uperr");err.innerHTML="";
  if(!f){err.innerHTML=`<div class="err">zip 파일을 선택하세요.</div>`;return;}
  const fd=new FormData();fd.append("file",f);
  fd.append("label",document.getElementById("u_label").value.trim());
  fd.append("network",document.getElementById("u_net").value);
  const btn=document.getElementById("u_btn");btn.disabled=true;btn.textContent="가져오는 중…";
  try{const r=await api("/import",{method:"POST",body:fd});location.hash="#/r/"+r.run.id;}
  catch(e){err.innerHTML=`<div class="err">${esc(e.message)}</div>`;btn.disabled=false;btn.textContent="가져오기";}
};

// ── 공격표면 히트맵 (호스트 × 서비스 카테고리), 클라이언트 계산 ──
const HEAT_CATS=[["web","웹"],["remote","원격"],["db","DB"],["file","파일"],["dir","디렉터리"],["mail","메일"],["infra","인프라"],["other","기타"]];
function catOf(port,svc){
  svc=(svc||"").toLowerCase(); const has=a=>a.indexOf(port)>=0;
  if(/https?|http-|proxy/.test(svc)||has([80,81,443,591,2082,2087,2095,3000,5000,7001,8000,8008,8080,8081,8088,8443,8888,9000,9090,9443]))return "web";
  if(/ssh|telnet|rdp|vnc|winrm|ms-wbt/.test(svc)||has([22,23,3389,5900,5901,5902,5903,5985,5986]))return "remote";
  if(/mysql|maria|mssql|ms-sql|postgres|oracle|mongo|redis|elastic|memcache/.test(svc)||has([1433,1434,3306,5432,1521,27017,6379,9200,5984,11211]))return "db";
  if(/ftp|smb|microsoft-ds|netbios|nfs|rpcbind|rpc/.test(svc)||has([21,20,139,445,2049,111]))return "file";
  if(/ldap|kerberos/.test(svc)||has([389,636,88,464,3268,3269]))return "dir";
  if(/smtp|pop3|imap/.test(svc)||has([25,465,587,110,995,143,993]))return "mail";
  if(/snmp|ntp|ipmi|syslog|tftp|isakmp|ssdp|mdns|llmnr/.test(svc)||has([161,162,623,123,514,69,500,4500,1900,5353,5355]))return "infra";
  return "other";
}
function buildHeat(ports){
  const hosts={};
  ports.forEach(p=>{
    const c=catOf(p.port,p.service);
    const h=hosts[p.host]||(hosts[p.host]={host:p.host,hostname:p.hostname,cats:{},total:0,unid:0});
    const cell=h.cats[c]||(h.cats[c]={n:0,u:0});
    cell.n++; h.total++;
    if(p.identified!=="Y"){cell.u++; h.unid++;}
  });
  return Object.values(hosts).sort((a,b)=>b.unid-a.unid||b.total-a.total);
}
function cellStyle(cell){
  if(!cell||!cell.n)return "background:#fafbfd;color:#cdd5e0";
  const lvl=cell.n>=5?2:cell.n>=2?1:0;
  const blue=["#e8effb","#aac4ef","#5b87da"], red=["#fde8e6","#f3a89f","#df5e51"];
  const bg=(cell.u>0?red:blue)[lvl];
  return `background:${bg};color:${lvl===2?"#fff":"#15294a"}`;
}
function heatmapHtml(ports){
  if(!ports.length)return "";
  const rows=buildHeat(ports);
  const head=HEAT_CATS.map(c=>`<th style="text-align:center">${c[1]}</th>`).join("");
  const body=rows.map(h=>`<tr>
    <td class="mono">${esc(h.host)}${h.hostname?`<div class="muted" style="font-size:10.5px">${esc(h.hostname)}</div>`:""}</td>
    ${HEAT_CATS.map(c=>{const cell=h.cats[c[0]];return `<td style="text-align:center;font-weight:700;${cellStyle(cell)}">${cell?cell.n+(cell.u?`<span style="font-size:9px"> ●${cell.u}</span>`:""):""}</td>`;}).join("")}
    <td style="text-align:center;font-weight:700">${h.total}${h.unid?`<span style="color:#c0392b;font-size:10px"> ●${h.unid}</span>`:""}</td>
  </tr>`).join("");
  return `<h2 class="section">공격표면 히트맵 <span class="muted" style="font-weight:400;font-size:11.5px">셀=열린 포트 수 · ●=조치대상(미식별/판독필요) · 빨강=조치대상 포함</span></h2>
   <div class="card" style="overflow:auto"><table><thead><tr><th>호스트</th>${head}<th style="text-align:center">합계</th></tr></thead><tbody>${body}</tbody></table></div>`;
}

async function renderDetail(id){
  app.innerHTML=`<div class="muted" style="padding:40px;text-align:center">불러오는 중…</div>`;
  try{
    const d=await api("/"+id);
    let diff=null; try{ diff=await api("/"+id+"/diff"); }catch(e){}
    const r=d.run;const net={biz:"업무망",inet:"인터넷망"};
    const diffHtml=(diff&&diff.prev_run_id)?`
      <div class="card">
        <b>직전 회차 대비</b> <span class="muted" style="font-size:12px">(${esc(diff.prev_label||"")})</span>
        <div class="diffbox" style="margin-top:10px">
          <div class="diffcol new"><div class="muted" style="font-size:12px;margin-bottom:4px">신규 열린 포트 ${diff.new_count}</div>
            ${diff.new.map(p=>`<span class="pchip">${esc(p.host)}:${p.port}/${p.proto}</span>`).join("")||'<span class="muted">없음</span>'}</div>
          <div class="diffcol closed"><div class="muted" style="font-size:12px;margin-bottom:4px">닫힌 포트 ${diff.closed_count}</div>
            ${diff.closed.map(p=>`<span class="pchip">${esc(p.host)}:${p.port}/${p.proto}</span>`).join("")||'<span class="muted">없음</span>'}</div>
        </div></div>`:`<div class="card muted" style="font-size:12.5px">직전 회차 없음 — 최초 기준선.</div>`;

    app.innerHTML=`
      <div class="back" onclick="location.hash='#/'">← 회차 목록</div>
      <div class="card">
        <div style="display:flex;align-items:center;gap:10px">
          <b style="font-size:16px">${esc(r.label)}</b><span class="chip">${net[r.network]||r.network||"기타"}</span>
          <span class="muted" style="font-size:12px">${fmt(r.created_at)} · ${esc(r.source_name||"")}</span>
          <span style="flex:1"></span>
          <button class="btn-ghost" onclick="delRun(${id})">회차 삭제</button>
        </div>
        <div style="margin-top:10px">
          <span class="stat"><b>${r.host_count}</b>호스트</span>
          <span class="stat"><b>${r.open_port_count}</b>열린 포트</span>
          <span class="stat" style="color:#2e7d52"><b>${r.identified_count}</b>식별</span>
          <span class="stat" style="color:#c0392b"><b>${r.unidentified_count}</b>조치 대상</span>
        </div>
      </div>
      ${diffHtml}
      ${heatmapHtml(d.ports)}
      <h2 class="section">포트 — 정체·근거</h2>
      <div class="card">
        <div class="filterbar">
          <input id="f_q" placeholder="호스트·서비스·제품 검색" oninput="setQ(this.value)" style="flex:1;min-width:200px" value="${esc(FILT.q)}">
          <label class="ck"><input type="checkbox" ${FILT.onlyAction?"checked":""} onchange="setAction(this.checked)"> 조치 대상만(미식별·판독필요)</label>
        </div>
        <div style="overflow:auto">
          <table id="ptbl"><thead><tr>
            <th>호스트</th><th>담당 · 자산</th><th>포트</th><th>서비스</th><th>제품 · 버전</th><th>식별</th><th>근거 / 배너</th><th>비고</th>
          </tr></thead><tbody></tbody></table>
        </div>
      </div>`;
    window.__ports=d.ports;
    drawPorts();
  }catch(e){app.innerHTML=`<div class="back" onclick="location.hash='#/'">← 목록</div><div class="err">${esc(e.message)}</div>`;}
}
function drawPorts(){
  const tb=document.querySelector("#ptbl tbody");if(!tb)return;
  const q=FILT.q.trim().toLowerCase();
  let rows=window.__ports||[];
  if(FILT.onlyAction)rows=rows.filter(p=>p.identified!=="Y");
  if(q)rows=rows.filter(p=>[p.host,p.hostname,p.service,p.product,p.version].some(v=>(v||"").toLowerCase().includes(q)));
  if(!rows.length){tb.innerHTML=`<tr><td colspan="8" class="muted" style="text-align:center;padding:20px">해당 포트가 없습니다.</td></tr>`;return;}
  tb.innerHTML=rows.map(p=>`<tr class="${p.identified!=="Y"?"hl":""}">
    <td class="mono">${esc(p.host)}${p.hostname?`<div class="muted" style="font-size:11px">${esc(p.hostname)}</div>`:""}</td>
    <td>${p.owner_name||p.asset_no?`${esc(p.owner_name||"-")}${p.department?`<div class="muted" style="font-size:11px">${esc(p.department)}</div>`:""}${p.asset_no?`<div class="muted mono" style="font-size:10.5px">${esc(p.asset_no)}</div>`:""}`:'<span class="muted" style="font-size:11px">미매핑</span>'}</td>
    <td class="mono">${p.port}/${p.proto}</td>
    <td>${esc(p.service||"-")}</td>
    <td>${esc([p.product,p.version].filter(Boolean).join(" "))||'<span class="muted">-</span>'}</td>
    <td>${idBadge(p.identified)}</td>
    <td class="evi">${esc(p.evidence||"")}${p.banner?`<div class="mono" style="color:#9a7d12;margin-top:2px">📡 ${esc(p.banner)}</div>`:""}</td>
    <td class="muted" style="font-size:11.5px">${esc(p.note||"")}</td>
  </tr>`).join("");
}
window.setQ=function(v){FILT.q=v;drawPorts();};
window.setAction=function(v){FILT.onlyAction=v;drawPorts();};
window.delRun=async function(id){
  if(!confirm("이 회차를 삭제할까요?"))return;
  try{await api("/"+id,{method:"DELETE"});location.hash="#/";}catch(e){alert(e.message);}
};

window.addEventListener("hashchange",route);
route();
</script>
</body>
</html>
